apiVersion: v1
kind: ServiceAccount
metadata:
  name: django-ksa
  namespace: default
  annotations:
    # SUBSTITUTE: Replace PROJECT_ID with your actual GCP project ID before applying.
    # Must match: talana-app-sa@<GCP_PROJECT_ID>.iam.gserviceaccount.com
    # The WI binding (default/django-ksa → talana-app-sa) is provisioned by Terraform (story 1.4).
    iam.gke.io/gcp-service-account: talana-app-sa@PROJECT_ID.iam.gserviceaccount.com
