name: CD

on:
  push:
    branches:
      - main

env:
  REGISTRY_HOST: us-central1-docker.pkg.dev

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false # Never cancel in-progress deploys

permissions:
  contents: read
  id-token: write # MANDATORY for OIDC token issuance

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@6fc4af4b145ae7821d527454aa9bd537d1f2dc5f # v2.1.7
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          token_format: access_token

      - name: Configure Docker for Artifact Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push image
        run: |
          docker build -t ${{ env.REGISTRY_HOST }}/${{ secrets.GCP_PROJECT_ID }}/talana-artifact-registry/django:${{ github.sha }} app/
          docker push ${{ env.REGISTRY_HOST }}/${{ secrets.GCP_PROJECT_ID }}/talana-artifact-registry/django:${{ github.sha }}
