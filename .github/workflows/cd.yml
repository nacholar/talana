name: CD

on:
  push:
    branches:
      - main

env:
  REGISTRY_HOST: us-central1-docker.pkg.dev

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false # Never cancel in-progress deploys

permissions:
  contents: write  # upgraded from read — required for gh release create (story 4.3)
  id-token: write  # required for OIDC WIF authentication (story 4.1)

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@6fc4af4b145ae7821d527454aa9bd537d1f2dc5f # v2.1.7
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          token_format: access_token

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Configure Docker for Artifact Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push image
        run: |
          docker build -t ${{ env.REGISTRY_HOST }}/${{ secrets.GCP_PROJECT_ID }}/talana-artifact-registry/django:${{ github.sha }} app/
          docker push ${{ env.REGISTRY_HOST }}/${{ secrets.GCP_PROJECT_ID }}/talana-artifact-registry/django:${{ github.sha }}

      - name: Configure kubectl for GKE
        uses: google-github-actions/get-gke-credentials@64bc7249bbcf78056bb92f14d3cedc2da193946c # v2.3.5
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER }}
          location: ${{ secrets.GKE_REGION }}

      - name: Detect inactive slot
        id: detect-slot
        run: scripts/detect-slot.sh >> "$GITHUB_OUTPUT"

      - name: Deploy inactive slot
        run: |
          scripts/deploy-slot.sh \
            "${{ steps.detect-slot.outputs.INACTIVE_SLOT }}" \
            "${{ github.sha }}" \
            "${{ secrets.GCP_PROJECT_ID }}" \
            "${{ env.REGISTRY_HOST }}"

      - name: Smoke test inactive slot
        run: scripts/smoke-test.sh "${{ steps.detect-slot.outputs.INACTIVE_SLOT }}"

      - name: Switch Ingress traffic to inactive slot
        if: success()  # Explicit guard: must not run if smoke test failed (AC3 hard invariant)
        run: |
          scripts/switch-traffic.sh \
            "${{ steps.detect-slot.outputs.INACTIVE_SLOT }}" \
            "${{ steps.detect-slot.outputs.ACTIVE_SLOT }}"

      - name: Create GitHub release
        run: |
          gh release create "${{ github.sha }}" \
            --target "${{ github.sha }}" \
            --title "Deploy ${{ github.sha }}" \
            --notes "Blue/Green slot: ${{ steps.detect-slot.outputs.INACTIVE_SLOT }}" \
            || true  # Ignore duplicate-tag error on workflow re-runs
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Log failure info
        if: failure()
        run: |
          echo "DEPLOYMENT FAILED."
          echo "  Active slot  : ${{ steps.detect-slot.outputs.ACTIVE_SLOT }}"
          echo "  Inactive slot: ${{ steps.detect-slot.outputs.INACTIVE_SLOT }}"
          echo "  Image SHA    : ${{ github.sha }}"
